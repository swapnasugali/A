<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semantic Tags Example</title>
</head>
<body>

  <!-- Page Header -->
  <header>
    <h1>My Simple Website</h1>
    <nav>
      <a href="https://img.magnific.com/free-photo/beautiful-girl-standing-boat-looking-mountains-ratchaprapha-dam-khao-sok-national-park-surat-thani-province-thailand_335224-849.jpg?semt=ais_hybrid&w=740&q=80">clickme</a>
    </nav> 
  </header>

  <!-- Main Content -->
  <main>
    <!-- Article -->
     <article>
      <header>
        <h2>First Article</h2>
      </header>
      <section>
        <h3>Section 1</h3>
        <p>This is the first section of the article.</p>
      </section>
      <section>
      <footer>
        <p>Published: May 2026</p>
      </footer>
      </section>
    </article>

    <!-- Sidebar -->
     <aside>
      <h2>Sidebar</h2>
      <p>Some extra information goes here.</p>
    </aside>
</body>
</html>
