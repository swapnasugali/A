    <title>HTML Entities</title>

<body>

<h1>HTML Entities</h1>

<p>Less than: 5 &lt; 10</p>
<p>Greater than: 10 &gt; 5</p>
<p>Ampersand: Fish &amp; Chips</p>
<p>Double quote: &quot;Hello&quot;</p>
<p>Single quote: &apos;It&apos;s easy&apos;</p>
<p>Copyright: &copy; 2026</p>
<p>Registered: &reg; Logo</p>
<p>Trademark: &trade; Brand</p>
<p>Ellipsis: Wait for it&hellip;</p>
