<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
    <style>

/* when we moves mouse on button  */
        button:hover{
            background-color:blue;
            color:pink;
        }

/* when we click the button */
        button:active{
            background-color:brown
        }
/* cursour in input */
        button:focus{
            color: chartreuse;
        }

/* visited link */
        a:visited{
            color:gold
        }

/* unvisited link */
        a:link{
            color:lime
        }
     
        li:first-child{
            color:rgb(121, 6, 228)
        }

        li:last-child{
            color:darksalmon
        }

        li:nth-child(5){
            color:darkorange
        }

/* first of paragraph type  */
        p:first-of-type{
            color:darkmagenta
        }
        
        p:last-of-type{
            color:cornflowerblue
        }

/* Select everything except the given selector */
        li:not(.red){
            color:deepskyblue
        }

/* Checked checkbox/radio button */
        input:checked{
            accent-color:chocolate;
        }

/*root(html) element - all html page */
        :root{
            background-color:pink;
        }
    </style>
</head>
<body>

     <label>Gender</label><br>
