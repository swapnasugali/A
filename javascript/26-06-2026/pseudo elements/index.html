<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
    <style>
        body{
            width: 90%;
            height: auto;
            font-family: Arial, Helvetica, sans-serif;
            font-size: larger;
            border-style:ridge;
            border-color:cornflowerblue;
            font-weight:bold;
        }
        h1::after{
           color:blueviolet;
           content:" swapna"
        }

        h1::before{
            color:chocolate;
            content:"hello "
        }
        h1::first-letter{
            color:black;
            font-style: italic;
        }

        h3::first-line{
            color:chartreuse
        }

        li::first-letter{
            color:blue
        }

        li::first-line{
            color:rgb(255, 0, 140);
        }

/* list bullets or numbers */
        li::marker{
            color:darkred
        }
/* selected text  */
        ::selection{
            color:yellow
        }

    </style>
</head>
<body>
    
    <h3 style="color:darkcyan">hello<br>
        how are you<br>
        good 
    </h3>
    <h1>hiii</h1>
    <h2></h2>
    <p>good afternoon</p>
    <p>good evening</p>
    <p>Hello</p>
    <p>hi</p>

    <ul>
        <li>mango</li>
        <li>guava</li>
        <li>grapes</li>
        <li>banana</li>
        <li>strawberry</li>
        <li>pine apple</li>
        <li>apple</li>
    </ul>

    <button style="background-color: cadetblue;">click me</button>
</body>
</html>
