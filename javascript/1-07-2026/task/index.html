<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* laptop */


   #container{
    display:grid;
/* create 3 equal columns */
    grid-template-columns:repeat 3, 1fr;  
    gap:10px;
    width:80%;
    background-color: chartreuse;
    margin:auto;
}

.one{
    background:cadetblue;
    color:white;
    text-align:flex-start;
    padding:20px;
    border:2px solid white;
}
   
    #box1{
        grid-column: 1/3;
         background-color: blue;
    }

    #box2{
        grid-column: 3/4;
        background-color: blue;
    }

    #box3{
        grid-column: 1/4;
       background-color: blue;
       
    }

    #box4{
        grid-column: 1/2;
        background-color: blue;
    }
    #box5{
        grid-column: 2/4;
        background-color: blue;

    }
    #box6{
        grid-column: 1/4;
        background-color: blue;
    }


  
    /* tablet */

    @media screen and (min-width:601px) and (max-width:992px){
        #container{
            grid-template-columns: 1fr;
        }
     #box1,#box2,
        #box3,#box4,#box5,#box6{
            grid-column: 1;
        }
        #box4{
             height:80px;

        }
    }
      /* mobile */

    @media screen and (max-width:600px) {
        #container{
            grid-template-columns: 1fr;
        }
        #box1,#box2,
        #box3,#box4,#box5,#box6{
            grid-column: 1;
        }
        #box2{
            height:90px;
        }
        
    }




    </style>
</head>
<body>
    <div id="container">
        <div id="box1" class="one">Header</div>
        <div id="box2" class="one">Logo</div>
        <div id="box3" class="one">Navigation</div>
        <div id="box4" class="one">Sidebar</div>
        <div id="box5" class="one">Content</div>
        <div id="box6" class="one">Footer</div>
    </div>
</body>
</html>
