<!DOCTYPE html>
<html>
<head>
    <title>CSS Layouts</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>

<h1>CSS Layout Examples</h1>


<!-- Normal Flow -->
<section>
<h2>1. Normal Flow</h2>

<div class="normal">
    <div>Box 1</div>
    <div>Box 2</div>
    <div>Box 3</div>
</div>

</section>



<!-- Flexbox -->
<section>
<h2>2. Flexbox Layout</h2>

<div class="flex-container">

    <div>Box A</div>
    <div>Box B</div>
    <div>Box C</div>

</div>

</section>



<!-- Grid -->
<section>
<h2>3. Grid Layout</h2>

<div class="grid-container">

    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>

</div>

</section>



<!-- Position -->
<section>

<h2>4. Position Layout</h2>

<div class="position-box">

    <div class="child">
        Fixed Position
    </div>

</div>

</section>



<!-- Float -->
<section>

<h2>5. Float Layout</h2>

<img src="https://via.placeholder.com/100">

<p>
This text is wrapping around the image.
CSS float is used to move elements left or right.
</p>

</section>


</body>
</html>
